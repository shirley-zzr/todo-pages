<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <style>
    :root {
      --bg-start: #ffd6e7;
      --bg-middle: #ffc2d1;
      --bg-end: #ffe5ec;
      --card-bg: rgba(255, 255, 255, 0.72);
      --card-strong: rgba(255, 255, 255, 0.92);
      --text-main: #4e2f3c;
      --text-sub: #866977;
      --line: rgba(255, 255, 255, 0.58);
      --shadow-soft: 0 18px 40px rgba(193, 108, 137, 0.16);
      --shadow-card: 0 14px 35px rgba(206, 118, 149, 0.16);
      --high: #ff6b8a;
      --medium: #ffb366;
      --low: #77c9a5;
      --work: #ff8fab;
      --family: #9d8df1;
      --self: #64c7c7;
      --accent: #ff8fab;
      --accent-dark: #ef6f97;
      --danger: #c06482;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, var(--bg-start), var(--bg-middle), var(--bg-end));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      color: var(--text-main);
    }

    .shell {
      width: 100%;
      max-width: 1040px;
      padding: 1px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.28));
      box-shadow: var(--shadow-soft);
    }

    .app {
      border-radius: 30px;
      padding: 30px;
      background: rgba(255, 250, 253, 0.62);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .hero-left h1 {
      font-size: 34px;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }

    .hero-left p {
      color: var(--text-sub);
      font-size: 14px;
      line-height: 1.6;
    }

    .hero-right {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .ghost-card,
    .lang-switch,
    input,
    select,
    button,
    textarea {
      border: none;
      outline: none;
      border-radius: 16px;
      font-size: 14px;
    }

    .ghost-card {
      background: rgba(255,255,255,0.6);
      padding: 12px 14px;
      color: var(--text-sub);
      box-shadow: 0 8px 20px rgba(193, 108, 137, 0.08);
    }

    .lang-switch,
    input,
    select,
    textarea {
      background: rgba(255,255,255,0.94);
      color: var(--text-main);
      padding: 14px 16px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.3);
    }

    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      line-height: 1.5;
    }

    .panel {
      background: rgba(255,255,255,0.46);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
    }

    .composer {
      display: grid;
      grid-template-columns: 1.5fr 0.7fr 0.9fr 0.9fr auto;
      gap: 12px;
      align-items: center;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.1fr auto auto auto;
      gap: 12px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding-left: 42px;
    }

    .search-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #bf87a0;
      font-size: 14px;
      pointer-events: none;
    }

    .add-btn,
    .filter-btn,
    .delete-btn,
    .edit-btn,
    .save-btn,
    .cancel-btn {
      cursor: pointer;
    }

    .add-btn,
    .save-btn {
      background: linear-gradient(135deg, var(--accent), #ffb3c6);
      color: white;
      padding: 14px 18px;
      min-width: 116px;
      font-weight: 600;
      box-shadow: 0 14px 28px rgba(255, 143, 171, 0.28);
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .filter-btn {
      padding: 12px 14px;
      background: rgba(255,255,255,0.72);
      color: var(--text-main);
    }

    .filter-btn.active {
      background: var(--card-strong);
      box-shadow: 0 10px 22px rgba(206, 118, 149, 0.12);
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-sub);
      background: rgba(255,255,255,0.72);
    }

    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-sub);
      background: rgba(255,255,255,0.48);
      border: 1px dashed rgba(196, 131, 155, 0.25);
      border-radius: 24px;
      padding: 44px 16px;
    }

    .item {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,248,251,0.76));
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow-card);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .item:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 36px rgba(206, 118, 149, 0.2);
    }

    .item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, rgba(255,255,255,0.15), rgba(255,255,255,0.6));
    }

    .item.high::before { background: linear-gradient(90deg, #ff6b8a, #ff95ac); }
    .item.medium::before { background: linear-gradient(90deg, #ffb366, #ffd089); }
    .item.low::before { background: linear-gradient(90deg, #77c9a5, #9ee0c2); }

    .item.completed {
      opacity: 0.78;
    }

    .item.editing {
      border: 1px solid rgba(255, 143, 171, 0.72);
      box-shadow: 0 18px 36px rgba(255, 143, 171, 0.18);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .checkbox-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex: 1;
    }

    .check {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      cursor: pointer;
      accent-color: var(--accent-dark);
    }

    .task-text {
      font-size: 18px;
      line-height: 1.5;
      font-weight: 600;
      word-break: break-word;
    }

    .item.completed .task-text {
      text-decoration: line-through;
      color: #b293a1;
    }

    .badge-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .priority-badge,
    .category-badge {
      font-size: 12px;
      color: white;
      padding: 7px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .priority-badge.high { background: var(--high); }
    .priority-badge.medium { background: var(--medium); }
    .priority-badge.low { background: var(--low); }

    .category-badge.work { background: var(--work); }
    .category-badge.family { background: var(--family); }
    .category-badge.self { background: var(--self); }

    .item-meta {
      display: grid;
      gap: 10px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .meta-tag {
      background: rgba(255,255,255,0.82);
      color: var(--text-sub);
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 12px;
    }

    .item-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .status-text {
      font-size: 12px;
      color: var(--text-sub);
    }

    .action-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .delete-btn,
    .edit-btn,
    .cancel-btn {
      background: rgba(255,255,255,0.84);
      padding: 10px 14px;
    }

    .delete-btn {
      color: var(--danger);
    }

    .edit-btn {
      color: var(--accent-dark);
    }

    .cancel-btn {
      color: var(--text-sub);
    }

    .edit-form {
      display: grid;
      gap: 12px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    @media (max-width: 920px) {
      .composer,
      .toolbar,
      .edit-grid {
        grid-template-columns: 1fr;
      }

      .filters {
        justify-content: flex-start;
      }

      .list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .app {
        padding: 22px;
      }

      .hero-left h1 {
        font-size: 28px;
      }

      .item {
        min-height: auto;
      }

      .item-top,
      .item-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .badge-group,
      .action-group {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="app">
      <div class="hero">
        <div class="hero-left">
          <h1 id="title"></h1>
          <p id="subtitle"></p>
        </div>
        <div class="hero-right">
          <div class="ghost-card" id="todayBadge"></div>
          <select id="languageSelect" class="lang-switch" aria-label="language switcher">
            <option value="zh">中文</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>

      <div class="panel">
        <div class="composer">
          <input id="taskInput" type="text" />
          <select id="prioritySelect"></select>
          <select id="categorySelect"></select>
          <input id="dueDateInput" type="date" />
          <button class="add-btn" id="addButton"></button>
        </div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input id="searchInput" type="text" />
          </div>
          <select id="sortSelect"></select>
          <div class="stats" id="stats"></div>
          <div class="filters">
            <button class="filter-btn active" data-filter="all"></button>
            <button class="filter-btn" data-filter="active"></button>
            <button class="filter-btn" data-filter="completed"></button>
          </div>
        </div>
      </div>

      <div class="list" id="todoList"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'minimal_todo_pink_v4';
    const LANGUAGE_KEY = 'minimal_todo_language';

    const i18n = {
      zh: {
        title: '待办事项',
        subtitle: '用更轻盈的方式，安排今天的重要任务',
        placeholder: '输入一条新的待办事项...',
        searchPlaceholder: '搜索事项...',
        add: '添加',
        dueDate: '截止日期',
        dueNone: '未设置截止日期',
        duePrefix: '截止',
        created: '创建于',
        sort: '排序',
        edit: '编辑',
        save: '保存',
        cancel: '取消',
        today: '今天',
        priorities: {
          high: '高',
          medium: '中',
          low: '低'
        },
        categories: {
          work: '工作',
          family: '家庭',
          self: '自己'
        },
        sortOptions: {
          dueAsc: '按截止日期升序',
          dueDesc: '按截止日期降序'
        },
        filters: {
          all: '全部',
          active: '进行中',
          completed: '已完成'
        },
        stats: {
          total: '全部',
          active: '待完成',
          completed: '已完成'
        },
        empty: '没有匹配的事项，换个关键词试试。',
        delete: '删除',
        status: {
          pending: '未完成',
          completed: '已完成'
        },
        validation: '请输入待办内容',
        editValidation: '编辑内容不能为空'
      },
      en: {
        title: 'Todo List',
        subtitle: 'A soft and minimal space for what matters today',
        placeholder: 'Add a new todo item...',
        searchPlaceholder: 'Search tasks...',
        add: 'Add',
        dueDate: 'Due Date',
        dueNone: 'No due date',
        duePrefix: 'Due',
        created: 'Created',
        sort: 'Sort',
        edit: 'Edit',
        save: 'Save',
        cancel: 'Cancel',
        today: 'Today',
        priorities: {
          high: 'High',
          medium: 'Medium',
          low: 'Low'
        },
        categories: {
          work: 'Work',
          family: 'Family',
          self: 'Self'
        },
        sortOptions: {
          dueAsc: 'Due Date ↑',
          dueDesc: 'Due Date ↓'
        },
        filters: {
          all: 'All',
          active: 'Active',
          completed: 'Completed'
        },
        stats: {
          total: 'Total',
          active: 'Active',
          completed: 'Done'
        },
        empty: 'No matching tasks found.',
        delete: 'Delete',
        status: {
          pending: 'Pending',
          completed: 'Completed'
        },
        validation: 'Please enter a task',
        editValidation: 'Task content cannot be empty'
      }
    };

    let todos = loadTodos();
    let currentFilter = 'all';
    let currentLanguage = loadLanguage();
    let searchKeyword = '';
    let currentSort = 'dueAsc';
    let editingId = null;

    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');
    const todayBadge = document.getElementById('todayBadge');
    const taskInput = document.getElementById('taskInput');
    const prioritySelect = document.getElementById('prioritySelect');
    const categorySelect = document.getElementById('categorySelect');
    const dueDateInput = document.getElementById('dueDateInput');
    const addButton = document.getElementById('addButton');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const todoList = document.getElementById('todoList');
    const stats = document.getElementById('stats');
    const languageSelect = document.getElementById('languageSelect');
    const filterButtons = document.querySelectorAll('.filter-btn');

    function loadTodos() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function loadLanguage() {
      return localStorage.getItem(LANGUAGE_KEY) || 'zh';
    }

    function saveLanguage() {
      localStorage.setItem(LANGUAGE_KEY, currentLanguage);
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function translatePriority(priority) {
      return i18n[currentLanguage].priorities[priority];
    }

    function translateCategory(category) {
      return i18n[currentLanguage].categories[category];
    }

    function formatDate(value) {
      if (!value) return i18n[currentLanguage].dueNone;
      const date = new Date(value);
      return currentLanguage === 'zh'
        ? date.toLocaleDateString('zh-CN')
        : date.toLocaleDateString('en-US');
    }

    function formatToday() {
      const now = new Date();
      return currentLanguage === 'zh'
        ? `${i18n[currentLanguage].today}·${now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' })}`
        : `${i18n[currentLanguage].today} · ${now.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
    }

    function dueWeight(value) {
      if (!value) return Number.MAX_SAFE_INTEGER;
      return new Date(value).getTime();
    }

    function sortTodos(list) {
      return [...list].sort((a, b) => {
        if (currentSort === 'dueDesc') {
          return dueWeight(b.dueDate) - dueWeight(a.dueDate);
        }
        const diff = dueWeight(a.dueDate) - dueWeight(b.dueDate);
        if (diff !== 0) return diff;
        return b.createdAt - a.createdAt;
      });
    }

    function applyLanguage() {
      const t = i18n[currentLanguage];
      document.documentElement.lang = currentLanguage === 'zh' ? 'zh-CN' : 'en';
      title.textContent = t.title;
      subtitle.textContent = t.subtitle;
      todayBadge.textContent = formatToday();
      taskInput.placeholder = t.placeholder;
      searchInput.placeholder = t.searchPlaceholder;
      addButton.textContent = t.add;
      dueDateInput.setAttribute('aria-label', t.dueDate);
      languageSelect.value = currentLanguage;

      prioritySelect.innerHTML = `
        <option value="high">${t.priorities.high}</option>
        <option value="medium" selected>${t.priorities.medium}</option>
        <option value="low">${t.priorities.low}</option>
      `;

      categorySelect.innerHTML = `
        <option value="work">${t.categories.work}</option>
        <option value="family">${t.categories.family}</option>
        <option value="self">${t.categories.self}</option>
      `;

      sortSelect.innerHTML = `
        <option value="dueAsc">${t.sortOptions.dueAsc}</option>
        <option value="dueDesc">${t.sortOptions.dueDesc}</option>
      `;
      sortSelect.value = currentSort;
      sortSelect.setAttribute('aria-label', t.sort);

      filterButtons.forEach((button) => {
        const filter = button.dataset.filter;
        button.textContent = t.filters[filter];
      });

      renderStats();
      renderTodos();
    }

    function renderStats() {
      const t = i18n[currentLanguage];
      const total = todos.length;
      const active = todos.filter(item => !item.completed).length;
      const completed = todos.filter(item => item.completed).length;

      stats.innerHTML = `
        <span class="chip">${t.stats.total}:${total}</span>
        <span class="chip">${t.stats.active}:${active}</span>
        <span class="chip">${t.stats.completed}:${completed}</span>
      `;
    }

    function filteredTodos() {
      const keyword = searchKeyword.trim().toLowerCase();
      const filtered = todos.filter((item) => {
        const matchFilter = currentFilter === 'all'
          || (currentFilter === 'active' && !item.completed)
          || (currentFilter === 'completed' && item.completed);

        const matchSearch = !keyword
          || item.text.toLowerCase().includes(keyword)
          || translateCategory(item.category).toLowerCase().includes(keyword);
        return matchFilter && matchSearch;
      });

      return sortTodos(filtered);
    }

    function dueDateTag(item) {
      const t = i18n[currentLanguage];
      if (!item.dueDate) return `<span class="meta-tag">${t.dueNone}</span>`;
      return `<span class="meta-tag">${t.duePrefix}:${formatDate(item.dueDate)}</span>`;
    }

    function editCard(item) {
      const t = i18n[currentLanguage];
      return `
        <div class="item ${item.priority} editing">
          <div class="edit-form">
            <textarea id="edit-text-${item.id}" placeholder="${escapeHTML(t.placeholder)}">${escapeHTML(item.text)}</textarea>
            <div class="edit-grid">
              <select id="edit-priority-${item.id}">
                <option value="high" ${item.priority === 'high' ? 'selected' : ''}>${t.priorities.high}</option>
                <option value="medium" ${item.priority === 'medium' ? 'selected' : ''}>${t.priorities.medium}</option>
                <option value="low" ${item.priority === 'low' ? 'selected' : ''}>${t.priorities.low}</option>
              </select>
              <select id="edit-category-${item.id}">
                <option value="work" ${item.category === 'work' ? 'selected' : ''}>${t.categories.work}</option>
                <option value="family" ${item.category === 'family' ? 'selected' : ''}>${t.categories.family}</option>
                <option value="self" ${item.category === 'self' ? 'selected' : ''}>${t.categories.self}</option>
              </select>
              <input id="edit-due-${item.id}" type="date" value="${item.dueDate || ''}" />
            </div>
            <div class="item-actions">
              <span class="status-text">${item.completed ? t.status.completed : t.status.pending}</span>
              <div class="action-group">
                <button class="cancel-btn" onclick="cancelEdit()">${t.cancel}</button>
                <button class="save-btn" onclick="saveEdit('${item.id}')">${t.save}</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function viewCard(item) {
      const t = i18n[currentLanguage];
      return `
        <div class="item ${item.priority} ${item.completed ? 'completed' : ''}">
          <div class="item-top">
            <div class="checkbox-wrap">
              <input class="check" type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleTodo('${item.id}')" />
              <div class="task-text">${escapeHTML(item.text)}</div>
            </div>
            <div class="badge-group">
              <span class="category-badge ${item.category}">${translateCategory(item.category)}</span>
              <span class="priority-badge ${item.priority}">${translatePriority(item.priority)}</span>
            </div>
          </div>

          <div class="item-meta">
            <div class="meta-row">
              ${dueDateTag(item)}
              <span class="meta-tag">${t.created}:${formatDate(item.createdAt)}</span>
            </div>
          </div>

          <div class="item-actions">
            <span class="status-text">${item.completed ? t.status.completed : t.status.pending}</span>
            <div class="action-group">
              <button class="edit-btn" onclick="startEdit('${item.id}')">${t.edit}</button>
              <button class="delete-btn" onclick="deleteTodo('${item.id}')">${t.delete}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderTodos() {
      const t = i18n[currentLanguage];
      const visibleTodos = filteredTodos();

      if (visibleTodos.length === 0) {
        todoList.innerHTML = `<div class="empty">${t.empty}</div>`;
        return;
      }

      todoList.innerHTML = visibleTodos.map(item => item.id === editingId ? editCard(item) : viewCard(item)).join('');
    }

    function addTodo() {
      const text = taskInput.value.trim();
      if (!text) {
        alert(i18n[currentLanguage].validation);
        return;
      }

      todos.unshift({
        id: crypto.randomUUID(),
        text,
        priority: prioritySelect.value,
        category: categorySelect.value,
        dueDate: dueDateInput.value || '',
        completed: false,
        createdAt: Date.now()
      });

      taskInput.value = '';
      dueDateInput.value = '';
      prioritySelect.value = 'medium';
      categorySelect.value = 'work';
      saveTodos();
      renderStats();
      renderTodos();
      taskInput.focus();
    }

    function startEdit(id) {
      editingId = id;
      renderTodos();
    }

    function cancelEdit() {
      editingId = null;
      renderTodos();
    }

    function saveEdit(id) {
      const textEl = document.getElementById(`edit-text-${id}`);
      const priorityEl = document.getElementById(`edit-priority-${id}`);
      const categoryEl = document.getElementById(`edit-category-${id}`);
      const dueEl = document.getElementById(`edit-due-${id}`);
      const nextText = textEl.value.trim();

      if (!nextText) {
        alert(i18n[currentLanguage].editValidation);
        return;
      }

      todos = todos.map(item => item.id === id ? {
        ...item,
        text: nextText,
        priority: priorityEl.value,
        category: categoryEl.value,
        dueDate: dueEl.value || ''
      } : item);

      editingId = null;
      saveTodos();
      renderStats();
      renderTodos();
    }

    function toggleTodo(id) {
      todos = todos.map(item => item.id === id ? { ...item, completed: !item.completed } : item);
      saveTodos();
      renderStats();
      renderTodos();
    }

    function deleteTodo(id) {
      todos = todos.filter(item => item.id !== id);
      if (editingId === id) editingId = null;
      saveTodos();
      renderStats();
      renderTodos();
    }

    addButton.addEventListener('click', addTodo);
    taskInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') addTodo();
    });

    searchInput.addEventListener('input', (event) => {
      searchKeyword = event.target.value;
      renderTodos();
    });

    sortSelect.addEventListener('change', (event) => {
      currentSort = event.target.value;
      renderTodos();
    });

    languageSelect.addEventListener('change', (event) => {
      currentLanguage = event.target.value;
      saveLanguage();
      applyLanguage();
    });

    filterButtons.forEach((button) => {
      button.addEventListener('click', () => {
        currentFilter = button.dataset.filter;
        filterButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        renderTodos();
      });
    });

    window.toggleTodo = toggleTodo;
    window.deleteTodo = deleteTodo;
    window.startEdit = startEdit;
    window.cancelEdit = cancelEdit;
    window.saveEdit = saveEdit;

    applyLanguage();
  </script>
</body>
</html>
